services:
  backend:
    build:
      context: .
      target: backend
    environment:
      PORT: 3001
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-5}
      FFMPEG_BINARY_PATH: /usr/bin/ffmpeg
      FFMPEG_ENCODER: ${FFMPEG_ENCODER:-libx264}
    volumes:
      - render_data:/app/temp_superpowers/native-renders
    restart: unless-stopped
    expose:
      - "3001"

  frontend:
    build:
      context: .
      target: frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  render_data:
